$kind: http-request
name: "[DELETE] Delete gaming session (admin/operator)"
url: "{{base_url}}/gaming-sessions/{{session_id}}"
method: DELETE
headers:
  Accept: application/json
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status 200 or 204', () => {
          pm.expect(pm.response.code).to.be.oneOf([200, 204]);
      });
    language: text/javascript
order: 3000
