$kind: http-request
name: "[POST] api/login"
url: "{{base_url}}/login"
method: POST
headers:
  Accept: application/json
body:
  type: json
  content: |-
    {
        "email": "admin@warnet.com",
        "password": "password"
    }
scripts:
  - type: afterResponse
    code: |-
      var jsonData = pm.response.json();
      if (jsonData.token) {
          pm.collectionVariables.set("token", jsonData.token);
          console.log("Token automatically set!");
      }
    language: text/javascript
order: 1000
