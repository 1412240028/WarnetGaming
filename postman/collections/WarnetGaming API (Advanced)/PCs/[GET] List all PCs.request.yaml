$kind: http-request
url: "{{base_url}}/pcs"
method: GET
headers:
  Accept: application/json
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status 200', () => pm.response.to.have.status(200));
      pm.test('Response is array', () => {
          pm.expect(pm.response.json().data || pm.response.json()).to.be.an('array');
      });
    language: text/javascript
order: 1000
