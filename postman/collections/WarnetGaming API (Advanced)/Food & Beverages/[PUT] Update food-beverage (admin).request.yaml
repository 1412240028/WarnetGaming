$kind: http-request
name: "[PUT] Update food/beverage (admin)"
url: "{{base_url}}/food-beverages/{{food_id}}"
method: PUT
headers:
  Accept: application/json
  Content-Type: application/json
body:
  type: json
  content: |-
    {
        "price": 12000,
        "stock": 40
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status 200', () => pm.response.to.have.status(200));
      pm.test('Item updated', () => {
          const json = pm.response.json();
          pm.expect(json.data || json).to.have.property('price', 12000);
      });
    language: text/javascript
order: 4000
