$kind: http-request
name: "[GET] Show food/beverage by ID"
url: "{{base_url}}/food-beverages/{{food_id}}"
method: GET
headers:
  Accept: application/json
scripts:
  - type: afterResponse
    code: pm.test('Status 200', () => pm.response.to.have.status(200));
    language: text/javascript
order: 2000
