$kind: http-request
url: "{{base_url}}/operators/{{operator_id}}"
method: DELETE
headers:
  Accept: application/json
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status 200 or 204', () => {
          pm.expect(pm.response.code).to.be.oneOf([200, 204]);
      });
    language: text/javascript
order: 5000
