$kind: http-request
url: "{{base_url}}/operators"
method: POST
headers:
  Accept: application/json
  Content-Type: application/json
body:
  type: json
  content: |-
    {
        "user_id": {{operator_user_id}},
        "room_id": {{room_id}},
        "shift": "Pagi"
    }
scripts:
  - type: afterResponse
    code: pm.test('Status 201', () => pm.response.to.have.status(201));
    language: text/javascript
order: 2000
