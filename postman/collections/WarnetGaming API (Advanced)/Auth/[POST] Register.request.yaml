$kind: http-request
url: "{{base_url}}/register"
method: POST
headers:
  Accept: application/json
  Content-Type: application/json
body:
  type: json
  content: |-
    {
        "name": "Budi Santoso",
        "email": "budi@warnet.com",
        "password": "password"
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status 201', () => pm.response.to.have.status(201));
      pm.test('Response has token and user', () => {
          const json = pm.response.json();
          pm.expect(json).to.have.property('token');
          pm.expect(json).to.have.property('user');
          pm.expect(json.user).to.have.property('id');
          pm.expect(json.user).to.have.property('name');
          pm.expect(json.user).to.have.property('email');
          pm.expect(json.user).to.have.property('role');
      });
      pm.collectionVariables.set('token', pm.response.json().token);
    language: text/javascript
order: 2000
