$kind: http-request
name: "[POST] api/pelanggans"
url: "{{base_url}}/pelanggans"
method: POST
headers:
  Accept: application/json
body:
  type: json
  content: |-
    {
        "user_id": 3,
        "membership_id": 2,
        "status": "active"
    }
auth:
  type: bearer
  credentials:
    token: "{{token}}"
order: 2000
