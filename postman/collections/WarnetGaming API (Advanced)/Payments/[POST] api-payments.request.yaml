$kind: http-request
name: "[POST] api/payments"
url: "{{base_url}}/payments"
method: POST
headers:
  Accept: application/json
body:
  type: json
  content: |-
    {
        "gaming_session_id": 1,
        "nominal": 50000,
        "method": "cash"
    }
auth:
  type: bearer
  credentials:
    token: "{{token}}"
order: 2000
