$kind: http-request
name: "[PUT] Update payment (admin/operator)"
url: "{{base_url}}/payments/{{payment_id}}"
method: PUT
headers:
  Accept: application/json
  Content-Type: application/json
body:
  type: json
  content: |-
    {
        "method": "qris"
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status 200', () => pm.response.to.have.status(200));
      pm.test('Payment updated', () => {
          const json = pm.response.json();
          pm.expect(json.data || json).to.have.property('method', 'qris');
      });
    language: text/javascript
order: 4000
