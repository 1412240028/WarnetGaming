$kind: http-request
name: "[POST] Create payment (admin/operator)"
url: "{{base_url}}/payments"
method: POST
headers:
  Accept: application/json
  Content-Type: application/json
body:
  type: json
  content: |-
    {
        "gaming_session_id": {{session_id}},
        "nominal": 50000,
        "method": "cash"
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status 201', () => pm.response.to.have.status(201));
      pm.test('Payment created', () => {
          const json = pm.response.json();
          pm.expect(json.data || json).to.have.property('nominal');
          pm.expect(json.data || json).to.have.property('method');
      });
    language: text/javascript
order: 2000
