$kind: http-request
name: "[GET] Show payment (admin/operator)"
url: "{{base_url}}/payments/{{payment_id}}"
method: GET
headers:
  Accept: application/json
scripts:
  - type: afterResponse
    code: pm.test('Status 200', () => pm.response.to.have.status(200));
    language: text/javascript
order: 3000
