$kind: http-request
name: "[GET] Show pelanggan (admin/operator)"
url: "{{base_url}}/pelanggans/{{pelanggan_id}}"
method: GET
headers:
  Accept: application/json
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status 200', () => pm.response.to.have.status(200));
      pm.test('Response has user relation', () => {
          const json = pm.response.json();
          pm.expect(json.data || json).to.have.property('user');
      });
    language: text/javascript
order: 3000
