$kind: http-request
name: "[DELETE] Delete pelanggan (admin/operator)"
url: "{{base_url}}/pelanggans/{{pelanggan_id}}"
method: DELETE
headers:
  Accept: application/json
scripts:
  - type: afterResponse
    code: pm.test('Status 204', () => pm.response.to.have.status(204));
    language: text/javascript
order: 5000
