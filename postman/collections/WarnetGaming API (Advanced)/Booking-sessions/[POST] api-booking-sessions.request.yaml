$kind: http-request
name: "[POST] api/booking-sessions"
url: "{{base_url}}/booking-sessions"
method: POST
headers:
  Accept: application/json
body:
  type: json
  content: |-
    {
        "pelanggan_id": 1,
        "room_id": 1,
        "pc_id": 1,
        "operator_id": 1
    }
auth:
  type: bearer
  credentials:
    token: "{{token}}"
order: 1000
