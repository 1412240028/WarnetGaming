$kind: http-request
name: "[PUT] Update food order status (admin/operator)"
url: "{{base_url}}/food-orders/{{food_order_id}}/status"
method: PUT
headers:
  Accept: application/json
  Content-Type: application/json
body:
  type: json
  content: |-
    {
        "status": "paid"
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status 200', () => pm.response.to.have.status(200));
      pm.test('Order status updated', () => {
          const json = pm.response.json();
          pm.expect(json.data || json).to.have.property('status', 'paid');
      });
    language: text/javascript
order: 4000
