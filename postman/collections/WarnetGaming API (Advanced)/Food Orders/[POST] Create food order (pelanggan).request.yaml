$kind: http-request
url: "{{base_url}}/food-orders"
method: POST
headers:
  Accept: application/json
  Content-Type: application/json
body:
  type: json
  content: |-
    {
        "gaming_session_id": {{session_id}},
        "pelanggan_id": {{pelanggan_id}},
        "items": [
            {
                "food_beverage_id": {{food_id}},
                "quantity": 2
            }
        ]
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status 201', () => pm.response.to.have.status(201));
      pm.test('Order created with pending status', () => {
          const json = pm.response.json();
          pm.expect(json.data || json).to.have.property('status', 'pending');
      });
      const json = pm.response.json();
      if (json.data && json.data.id) {
          pm.collectionVariables.set('food_order_id', json.data.id);
      }
    language: text/javascript
order: 3000
