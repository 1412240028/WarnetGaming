$kind: http-request
name: "[PUT] api/food-orders/{foodOrder}/status"
url: "{{base_url}}/food-orders/:foodOrder/status"
method: PUT
headers:
  Accept: application/json
pathVariables:
  foodOrder: "1"
body:
  type: json
  content: |-
    {
        "status": "paid"
    }
auth:
  type: bearer
  credentials:
    token: "{{token}}"
order: 3000
