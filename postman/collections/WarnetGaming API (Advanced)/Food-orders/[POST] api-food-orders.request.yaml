$kind: http-request
name: "[POST] api/food-orders"
url: "{{base_url}}/food-orders"
method: POST
headers:
  Accept: application/json
body:
  type: json
  content: |-
    {
        "gaming_session_id": 1,
        "pelanggan_id": 1,
        "items": [
            {
                "food_beverage_id": 1,
                "quantity": 2
            }
        ]
    }
auth:
  type: bearer
  credentials:
    token: "{{token}}"
order: 4000
