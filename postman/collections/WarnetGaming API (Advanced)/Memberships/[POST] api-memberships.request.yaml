$kind: http-request
name: "[POST] api/memberships"
url: "{{base_url}}/memberships"
method: POST
headers:
  Accept: application/json
body:
  type: json
  content: |-
    {
        "level": "Diamond",
        "discount_percent": 20
    }
auth:
  type: bearer
  credentials:
    token: "{{token}}"
order: 2000
