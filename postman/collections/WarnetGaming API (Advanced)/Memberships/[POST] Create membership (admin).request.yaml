$kind: http-request
url: "{{base_url}}/memberships"
method: POST
headers:
  Accept: application/json
  Content-Type: application/json
body:
  type: json
  content: |-
    {
        "level": "Diamond",
        "discount_percent": 20
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status 201', () => pm.response.to.have.status(201));
      pm.test('Membership created', () => {
          const json = pm.response.json();
          pm.expect(json.data || json).to.have.property('level');
      });
    language: text/javascript
order: 2000
