$kind: http-request
url: "{{base_url}}/memberships/{{membership_id}}"
method: PUT
headers:
  Accept: application/json
  Content-Type: application/json
body:
  type: json
  content: |-
    {
        "discount_percent": 25
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status 200', () => pm.response.to.have.status(200));
      pm.test('Membership updated', () => {
          const json = pm.response.json();
          pm.expect(json.data || json).to.have.property('discount_percent', 25);
      });
    language: text/javascript
order: 4000
