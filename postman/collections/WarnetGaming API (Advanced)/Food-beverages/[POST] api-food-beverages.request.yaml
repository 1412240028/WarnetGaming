$kind: http-request
name: "[POST] api/food-beverages"
url: "{{base_url}}/food-beverages"
method: POST
headers:
  Accept: application/json
body:
  type: json
  content: |-
    {
        "name": "Indomie Telur",
        "category": "food",
        "price": 10000,
        "stock": 50,
        "is_available": true
    }
auth:
  type: bearer
  credentials:
    token: "{{token}}"
order: 3000
