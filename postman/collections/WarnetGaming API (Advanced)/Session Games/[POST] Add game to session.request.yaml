$kind: http-request
url: "{{base_url}}/gaming-sessions/{{session_id}}/games"
method: POST
headers:
  Accept: application/json
  Content-Type: application/json
body:
  type: json
  content: |-
    {
        "game_id": {{game_id}},
        "notes": "Ranked match"
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status 201', () => pm.response.to.have.status(201));
      pm.test('Game added to session', () => {
          const json = pm.response.json();
          pm.expect(json.data || json).to.have.property('game_id');
      });
    language: text/javascript
order: 2000
