$kind: http-request
url: "{{base_url}}/rooms/{{room_id}}"
method: PUT
headers:
  Accept: application/json
  Content-Type: application/json
body:
  type: json
  content: |-
    {
        "name": "VIP Room Updated",
        "type": "VIP"
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status 200', () => pm.response.to.have.status(200));
      pm.test('Room updated', () => {
          const json = pm.response.json();
          pm.expect(json.data || json).to.have.property('name', 'VIP Room Updated');
      });
    language: text/javascript
order: 4000
