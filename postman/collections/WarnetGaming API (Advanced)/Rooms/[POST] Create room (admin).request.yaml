$kind: http-request
url: "{{base_url}}/rooms"
method: POST
headers:
  Accept: application/json
  Content-Type: application/json
body:
  type: json
  content: |-
    {
        "name": "VIP Room 2",
        "type": "VIP"
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status 201', () => pm.response.to.have.status(201));
      pm.test('Room created with correct name', () => {
          const json = pm.response.json();
          pm.expect(json.data || json).to.have.property('name');
      });
    language: text/javascript
order: 3000
