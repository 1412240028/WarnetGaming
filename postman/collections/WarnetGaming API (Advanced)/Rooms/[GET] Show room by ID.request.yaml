$kind: http-request
url: "{{base_url}}/rooms/{{room_id}}"
method: GET
headers:
  Accept: application/json
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status 200', () => pm.response.to.have.status(200));
      pm.test('Response has room data', () => {
          const json = pm.response.json();
          pm.expect(json.data || json).to.have.property('id');
          pm.expect(json.data || json).to.have.property('name');
      });
    language: text/javascript
order: 2000
